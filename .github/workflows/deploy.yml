name: Deploy Chez Framboise → Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch: # permet un déclenchement manuel depuis l'onglet Actions

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      # ----- Tentative 1 -----
      - name: Deploy via FTP (tentative 1) 📂
        id: t1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR || './' }}
          local-dir: ./
          dangerous-clean-slate: false
          timeout: 120000 # 120 s — Hostinger ferme parfois la socket de contrôle trop tôt
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.claude/**
            **/*.ps1
            **/CLAUDE.md
            **/README.md
            **/style.css
            **/script.js

      # ----- Tentative 2 (si la 1 a échoué) -----
      - name: Pause avant tentative 2 ⏳
        if: steps.t1.outcome == 'failure'
        run: sleep 15

      - name: Deploy via FTP (tentative 2) 📂
        id: t2
        if: steps.t1.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR || './' }}
          local-dir: ./
          dangerous-clean-slate: false
          timeout: 120000
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.claude/**
            **/*.ps1
            **/CLAUDE.md
            **/README.md
            **/style.css
            **/script.js

      # ----- Tentative 3 (si la 2 a échoué) — dernière chance, fait échouer le run -----
      - name: Pause avant tentative 3 ⏳
        if: steps.t2.outcome == 'failure'
        run: sleep 30

      - name: Deploy via FTP (tentative 3) 📂
        if: steps.t2.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR || './' }}
          local-dir: ./
          dangerous-clean-slate: false
          timeout: 120000
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.claude/**
            **/*.ps1
            **/CLAUDE.md
            **/README.md
            **/style.css
            **/script.js
