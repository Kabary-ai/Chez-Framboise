name: Deploy Chez Framboise → Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch: # permet un déclenchement manuel depuis l'onglet Actions

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Deploy via FTP 📂
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Dossier distant : './' si le compte FTP est limité au domaine,
          # sinon '/domains/chezframboise.re/public_html/' si compte FTP principal.
          server-dir: ${{ secrets.FTP_SERVER_DIR || './' }}
          local-dir: ./
          dangerous-clean-slate: false
          # On n'envoie que le site : on exclut le dev, les scripts et la doc.
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.claude/**
            **/*.ps1
            **/CLAUDE.md
            **/README.md
            **/style.css
            **/script.js
